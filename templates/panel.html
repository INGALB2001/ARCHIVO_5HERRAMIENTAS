<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio - Herramientas</title>
  <style>
    body {
      background: #0a0f1e;
      color: white;
      font-family: Arial, sans-serif;
      padding: 60px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #b7c0d8;
      margin-bottom: 30px;
    }

    .cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: #111827;
      border: 1px solid #23304a;
      border-radius: 16px;
      padding: 30px;
      width: 220px;
      text-decoration: none;
      color: white;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #38bdf8;
    }
  </style>
</head>
<body>

  <h1>Panel de Herramientas</h1>
  <p>Selecciona la herramienta que deseas utilizar.</p>

  <div class="cards">
    <a class="card" href="/laser">
      <h2>Calculadora Láser</h2>
      <p>Cálculo de corte, material y tiempos.</p>
    </a>

    <a class="card" href="/cotizador">
      <h2>Cotizador</h2>
      <p>Generación de cotizaciones.</p>
    </a>

    <a class="card" href="/remision">
      <h2>Remisión</h2>
      <p>Generación de remisiones.</p>
    </a>

    <a class="card" href="/ordenes">
      <h2>Órdenes</h2>
      <p>Control de órdenes de trabajo.</p>
    </a>
  </div>

</body>
</html>
